function togglePwdVisible(uid, pwd){
  const el = document.getElementById("pwd-display-"+uid);
  if(!el) return;
  el.textContent = el.textContent.includes("•") ? pwd : "••••••••";
}
function startPwd(id){ STATE.pwdTarget=Number(id); render(); }
function cancelPwd(){ STATE.pwdTarget=null; render(); }
function savePwd(userId){
  const targetId = Number(userId !== undefined ? userId : STATE.pwdTarget);
  const inputEl = document.getElementById("new-pwd-"+targetId);
  const p = inputEl?.value||"";
  if(p.length<6){ alert("Mínimo 6 caracteres."); return; }

  const targetUser = STATE.users.find(u=>Number(u.id)===targetId);
  if(!targetUser){ alert("Usuario no encontrado."); return; }

  // Changing own password
  if(STATE.user && Number(STATE.user.id) === targetId){
    const fbUser = auth ? auth.currentUser : null;
    if(fbUser){
      fbUser.updatePassword(p)
        .then(()=>{
          // Also update local
          STATE.users = STATE.users.map(u=>Number(u.id)===targetId?{...u,password:p}:u);
          lsSet(KEYS.users, STATE.users);
          fsSaveUsers(STATE.users);
          STATE.pwdTarget=null;
          STATE.configFlash="✓ Contraseña actualizada correctamente";
          setTimeout(()=>{ STATE.configFlash=""; render(); },3000);
          render();
        })
        .catch(e=>{
          alert("Error: "+e.message);
        });
      return;
    }
  }

  // Admin changing another user's password — show Firebase instructions
  STATE.pwdTarget=null;
  STATE.configFlash="Para cambiar la clave de "+targetUser.name+": ve a firebase.google.com → proyecto protocolo-ptr → Authentication → Users → busca "+targetUser.username+"@ptr.app → ··· → Editar usuario → escribe nueva contraseña → Guardar";
  setTimeout(()=>{ STATE.configFlash=""; render(); },12000);
  render();
}

function toggleUser(id){
  if(id===STATE.user.id){ alert("No puede desactivar tu propio usuario."); return; }
  STATE.users=STATE.users.map(u=>u.id===id?{...u,active:!u.active}:u);
  lsSet(KEYS.users,STATE.users);
  render();
}
function deleteUser(id){
  if(id===STATE.user.id){ alert("No puede eliminar tu propio usuario."); return; }
  if(!confirm("¿Eliminar usuario?")) return;
  STATE.users=STATE.users.filter(u=>u.id!==id);
  lsSet(KEYS.users,STATE.users);
  render();
}
function addUser(){
  const name=document.getElementById("nu-name")?.value.trim()||"";
  const user=document.getElementById("nu-user")?.value.trim().toLowerCase()||"";
  const pass=document.getElementById("nu-pass")?.value.trim()||"";
  const role=document.getElementById("nu-role")?.value||"user";
  if(!name||!user||!pass){ alert("Complete todos los campos."); return; }
  if(STATE.users.find(u=>u.username===user)){ alert("Nombre de usuario ya existe."); return; }
  STATE.users=[...STATE.users,{id:Date.now(),name,username:user,password:pass,role,active:true}];
  lsSet(KEYS.users,STATE.users);
  STATE.configFlash="Usuario creado ✓";
  setTimeout(()=>{ STATE.configFlash=""; render(); },2500);
  render();
}

  const SCORE_FIELDS = ["kss_knee","kss_func","oxford","womac_total","vas","tug","extension","flexion"];
  const SCORE_LABELS = ["KSS Knee","KSS Func","Oxford","WOMAC","VAS","TUG","Extensión","Flexión"];
  const PERIODOS_EXPORT = ["preop","6m","12m","24m","3-5a","5-9a","10a+"];

  // Fields to skip from the patient base object
  const skipFields = new Set([
    // Internal/technical
    "id","fechaCx","_oxford_pre_vals","_womac_pre_vals",
    // Legacy/renamed fields that may exist in old patient records
    "hc","seguimiento_meses",
    "kssKnee_post","kssFuncion_post","womac_post","oxford_post",
    "vas_post","tug_post","extension_post","flexion_post",
    // Pre-op scores (exported via controls Pre-operatorio columns)
    "kssKnee_pre","kssFuncion_pre","womac_pre","oxford_pre","vas_pre","tug_pre",
    "extension_pre","flexion_pre",
    // Internal sub-scores
    "womac_dolor_pre","womac_rigidez_pre","womac_func_pre",
    // Obsolete legacy fields
    "ldfa","flexum","rangoFlex","corte_femoral_frontal","corte_femoral_sagital",
    "corte_tibial_frontal","flexion_gap","extension_gap","arcoMovil_post",
  ]);
  const baseKeys = Object.keys(pts[0]||{}).filter(k=>!skipFields.has(k)&&!k.startsWith("_"));

  // ── Group definitions for header row 1 ────────────────────────────────────
  // Each group: { label, count }  — drives merges in row 1
  const BASE_GROUPS = [
    { label:"Identificación",   keys:["fechaRegistro","nombre","rut","fechaNac","edad","correo"] },
    { label:"Datos paciente",   keys:["sexo","lado","imc","asa","dm","hta","tabaco","anticoagulacion","indicacion","tiempoEvolucion","cirugiaPrevia"] },
    { label:"RX Pre-op",        keys:["kellgren","morfotipo","varo_valgo_clinico","ejeMecanico","vca","mad","aLDFA","mLDFA","mpta","jlca","tibialSlope","pco_pre","aco_pre","is_pre","alturaRotuliana","subluxRotuliana"] },
    { label:"Quirúrgico",       keys:["cirujano","implante","tamFemur","tamTibia","tamInserto","tamRotula","tecnica","conservacionLca","liberaciones","patella_resurfacing","tourniquet","tiempoCirugia","sangrado"] },
    { label:"RX Post-op",       keys:["ejeMecanico_post","mad_post","mLDFA_post","dffa","atfa","tibialSlope_post","pco_post","aco_post","is_post","altura_rotuliana_post"] },
    { label:"Mako",             keys:["mako_usado","mako_hka_plan","mako_hka_real","mako_dffa_plan","mako_dffa_real","mako_atfa_plan","mako_atfa_real","mako_slope_plan","mako_slope_real","mako_flex_gap","mako_ext_gap","mako_balance_flex","mako_balance_ext","mako_reseccion_femoral","mako_reseccion_tibial","mako_notas"] },
    { label:"Complicaciones",   keys:["infeccion","tvp_tep","rigidez","aflojamiento","fractura_periprotesica","revision","otras_complicaciones","notas"] },
  ];

  // Build base groups only with keys that actually exist in the data
  const baseGroups = BASE_GROUPS.map(g=>({
    label: g.label,
    keys: g.keys.filter(k=>baseKeys.includes(k))
  })).filter(g=>g.keys.length>0);

  // Any base key not covered by a group goes into "Otros"
  const coveredKeys = new Set(baseGroups.flatMap(g=>g.keys));
  const otherKeys = baseKeys.filter(k=>!coveredKeys.has(k));
  if(otherKeys.length) baseGroups.push({label:"Otros", keys:otherKeys});

  // Score groups per period
  const periodGroups = PERIODOS_EXPORT.map(per=>{
    const pLabel = PERIODOS.find(x=>x.id===per)?.label||per;
    return { label: pLabel, period: per, count: SCORE_FIELDS.length };
  });

  // ── Build column list ──────────────────────────────────────────────────────
  // colList: [{group, header2, key_or_fn}]
  const colList = [];
  // Clean up column labels: strip group-specific prefixes
  const COL_LABEL_MAP = {
    mako_usado:"Usado", mako_hka_plan:"HKA Plan", mako_hka_real:"HKA Real",
    mako_dffa_plan:"DFFA Plan", mako_dffa_real:"DFFA Real",
    mako_atfa_plan:"aTFA Plan", mako_atfa_real:"aTFA Real",
    mako_slope_plan:"Slope Plan", mako_slope_real:"Slope Real",
    mako_flex_gap:"Flex Gap", mako_ext_gap:"Ext Gap",
    mako_balance_flex:"Balance Flex", mako_balance_ext:"Balance Ext",
    mako_reseccion_femoral:"Resección Femoral", mako_reseccion_tibial:"Resección Tibial",
    mako_notas:"Notas",
  };

    g.keys.forEach(k=>colList.push({group:g.label, h2:COL_LABEL_MAP[k]||k, baseKey:k}));

  periodGroups.forEach(pg=>{
    SCORE_FIELDS.forEach((sf,si)=>{

  // ── Styles ──────────────────────────────────────────────────────────────────
  // Group colors (cycling)

  // For each group, assign a color index
  const grpColorMap = {};
  groups.forEach((g,i)=>{ grpColorMap[g.label] = GRP_COLORS[i % GRP_COLORS.length]; });

  // Style index mapping:
  // xfId 0 = default
  // xfId 1+N = group header style for group N (bold, centered, bg=grpColor, thick bottom)
  // xfId G+1 = row2 header: bold, centered, no fill, thick left for first-in-group
  // xfId G+2 = row2 non-first: bold, centered
  // xfId G+3 = data cell first-in-group: thick left border

    ...groups.map((g,gi)=> xfBase(1, gi+2, 1, centerWrap)),

    xfBase(2, 0, 2, centerNoWrap),
    // numGroups+2: row2 normal (bold, thin border, center)
    xfBase(2, 0, 3, centerNoWrap),
    // numGroups+3: data first-in-group (thick left)
    xfBase(0, 0, 2, ""),
    // numGroups+4: data normal
    xfBase(0, 0, 0, ""),
  ];

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  ${fontsXml}${fillsXml}${bordersXml}
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs count="${xfList.length}">${xfList.join("")}</cellXfs>
</styleSheet>`;

  // ── Rebuild makeCell to accept style id ────────────────────────────────────
  function makeCellS(val,ri,ci,styleId){
    const ref=colName(ci)+(ri+1);
    const sAttr = styleId ? ` s="${styleId}"` : "";
    if(val===""||val===null||val===undefined) return `<c r="${ref}" t="s"${sAttr}><v>${ssi("")}</v></c>`;
    const num=!isNaN(Number(val))&&String(val).trim()!=="";
    return num?`<c r="${ref}"${sAttr}><v>${Number(val)}</v></c>`:`<c r="${ref}" t="s"${sAttr}><v>${ssi(String(val))}</v></c>`;
  }

  // ── Rebuild row 1 with styles ──────────────────────────────────────────────
  const row1styled = colList.map((_,ci)=>{
    const grp = groups.find(g=>ci>=g.start&&ci<=g.end);
    const styleId = groups.indexOf(grp) + 1; // 1..numGroups
    return makeCellS(ci===grp.start?grp.label:"", 0, ci, styleId);
  }).join("");

  // ── Rebuild row 2 with styles ──────────────────────────────────────────────
  const row2styled = colList.map((col_def,ci)=>{
    const grp = groups.find(g=>ci>=g.start&&ci<=g.end);
    const isFirst = ci===grp.start;
    return makeCellS(col_def.h2, 1, ci, isFirst ? STYLE_R2_FIRST : STYLE_R2_NORMAL);
  }).join("");

  // ── Rebuild data rows with styles ─────────────────────────────────────────
  const dataXmlStyled = dataRows.map((row,ri)=>`<row r="${ri+3}">${
    row.map((val,ci)=>{
      const grp=groups.find(g=>ci>=g.start&&ci<=g.end);
      const isFirst=ci===grp.start;
      return makeCellS(val, ri+2, ci, isFirst ? STYLE_DATA_FIRST : STYLE_DATA_NORMAL);
    }).join("")
  }</row>`).join("");

  const shXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <sheetViews><sheetView workbookViewId="0"><pane ySplit="2" topLeftCell="A3" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>
  <sheetData>
    <row r="1" ht="24" customHeight="1">${row1styled}</row>
    <row r="2" ht="40" customHeight="1">${row2styled}</row>
    ${dataXmlStyled}
  </sheetData>
  ${mergeXml?`<mergeCells count="${groups.filter(g=>g.end>g.start).length}">${mergeXml}</mergeCells>`:""}
</worksheet>`;

  const wbXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="PTR" sheetId="1" r:id="rId1"/></sheets></workbook>`;

  function crc32(d){let c=0xffffffff;if(!crc32.t){crc32.t=new Uint32Array(256);for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=(x&1)?(0xedb88320^(x>>>1)):(x>>>1);crc32.t[i]=x;}}for(let i=0;i<d.length;i++)c=crc32.t[(c^d[i])&0xff]^(c>>>8);return(c^0xffffffff)>>>0;}

}

// ── RUT formatter ─────────────────────────────────────────────────────────────
function formatRut(val){
  // Strip everything except digits and k/K
  let v = val.replace(/[^0-9kK]/g,"").toUpperCase();
  if(!v) return "";
  // Separate verifier digit
  const dv = v.slice(-1);
  let body = v.slice(0,-1).replace(/^0+/,""); // remove leading zeros
  if(!body) return dv; // only verifier typed
  // Add dots every 3 digits from right
  let formatted = "";
  let i = body.length;
  while(i > 0){
    formatted = body.slice(Math.max(0,i-3), i) + (formatted ? "." + formatted : "");
    i -= 3;
  }
  return formatted + "-" + dv;
}

function formatRutInput(input){
  const raw = input.value;
  const formatted = formatRut(raw);
  input.value = formatted;
  setFormField("rut", formatted);
}
