<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Protocolo PTR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#1e293b}
input,select,textarea,button{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Layout */
#app{min-height:100vh}
.header{background:#0f4c81;padding:0 24px;box-shadow:0 2px 10px rgba(15,76,129,.35);position:sticky;top:0;z-index:100}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.header-logo{display:flex;align-items:center;gap:12px}
.header-logo h1{color:#fff;font-size:15px;font-weight:800}
.header-logo p{color:#93c5fd;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.header-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-btn{background:transparent;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600}
.nav-btn.active{background:rgba(255,255,255,.2)}
.nav-sep{width:1px;height:22px;background:rgba(255,255,255,.2)}
.nav-user{color:#bfdbfe;font-size:12px}
.nav-exit{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.demo-badge{background:#fef9c3;color:#854d0e;border-radius:12px;padding:3px 12px;font-size:11px;font-weight:700}

.page{max-width:1280px;margin:0 auto;padding:24px 18px}
.hidden{display:none!important}

/* Cards */
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:22px;margin-bottom:18px}
.sec-title{border-bottom:2px solid #f1f5f9;padding-bottom:11px;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.sec-title .icon{font-size:18px}
.sec-title h3{font-weight:800;font-size:14px;color:#0f4c81}
.sec-title p{font-size:11px;color:#94a3b8;margin-top:1px}

/* Grid */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.span-2{grid-column:span 2}
.span-3{grid-column:span 3}

/* Fields */
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#64748b;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:14px;color:#1e293b;background:#f8fafc;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#0f4c81}
.field textarea{min-height:75px;resize:vertical}
.field select{cursor:pointer}
.field input:disabled,.field select:disabled,.field textarea:disabled{opacity:.6;cursor:not-allowed}

/* Date picker */
.date-grid{display:grid;grid-template-columns:1fr 2fr 1.4fr;gap:5px}
.date-grid select{padding:8px 4px;text-align:center}

/* Buttons */
.btn-blue{background:#0f4c81;color:#fff;border:none;border-radius:7px;padding:10px 22px;font-weight:700;font-size:14px;cursor:pointer}
.btn-gray{background:#e2e8f0;color:#334155;border:none;border-radius:7px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer}
.btn-red{background:#fee2e2;color:#b91c1c;border:none;border-radius:6px;padding:5px 10px;font-weight:600;font-size:12px;cursor:pointer}
.btn-green{background:#f0fdf4;color:#15803d;border:none;border-radius:6px;padding:5px 10px;font-weight:600;font-size:12px;cursor:pointer}
.btn-sm{padding:4px 10px;font-size:11px}

/* Info boxes */
.info-box{padding:9px 13px;border-radius:7px;margin-bottom:14px;font-size:12px;line-height:1.6}
.info-blue{background:#f0f9ff;color:#0369a1}
.info-green{background:#f0fdf4;color:#15803d}
.info-yellow{background:#fefce8;color:#854d0e}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:7px 15px;border-radius:18px;border:none;cursor:pointer;font-weight:500;background:#f1f5f9;color:#64748b;font-size:13px}
.tab-btn.active{background:#0f4c81;color:#fff;font-weight:700}

/* Table */
.table-wrap{overflow-x:auto;background:#fff;border-radius:10px;border:1px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc}
th{padding:9px 10px;text-align:left;font-weight:700;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #e2e8f0;white-space:nowrap}
tbody tr:nth-child(even){background:#fafafa}
td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
.val-ok{font-weight:700;color:#15803d}
.val-bad{font-weight:700;color:#dc2626}

/* Login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f4c81,#1e6fb5)}
.login-box{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box .logo{text-align:center;margin-bottom:32px}
.login-box .logo .emoji{font-size:44px;margin-bottom:10px}
.login-box .logo h1{font-size:20px;font-weight:800;color:#0f4c81;margin-bottom:4px}
.login-box .logo p{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em}
.login-box .field{margin-bottom:16px}
.btn-primary{background:linear-gradient(135deg,#0f4c81,#1e6fb5);color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.login-err{background:#fee2e2;color:#b91c1c;border-radius:7px;padding:9px 13px;font-size:13px;margin-bottom:16px}
.login-note{text-align:center;font-size:11px;color:#cbd5e1;margin-top:20px}

/* Flash */
.flash-ok{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px;font-weight:600}

/* Config table */
.cfg-list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:4px}
.cfg-list-item:nth-child(odd){background:#f8fafc}
.cfg-list-item span{flex:1}

/* Misc */
.empty-state{text-align:center;padding:70px 20px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;color:#94a3b8}
.empty-state .big{font-size:50px;margin-bottom:12px}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.form-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.save-ok{text-align:right;color:#15803d;font-weight:700;margin-top:8px;font-size:13px}
.demo-banner{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 16px;font-size:13px;color:#854d0e;margin-bottom:16px;font-weight:600}
.role-badge{border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.status-badge{border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .header{padding:0 12px}
  .header-inner{height:auto;padding:10px 0;flex-direction:column;align-items:flex-start;gap:8px}
  .header-nav{gap:4px;width:100%}
  .nav-btn{padding:5px 10px;font-size:12px}
  .nav-user{font-size:11px}
  .page{padding:14px 10px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr!important}
  .span-2,.span-3{grid-column:span 1!important}
  .card{padding:14px}
  .list-header{flex-direction:column;align-items:flex-start;gap:10px}
  .list-header>div:last-child{width:100%;display:flex;flex-direction:column;gap:8px}
  .list-header>div:last-child button{width:100%}
  .tabs{gap:4px}
  .tab-btn{padding:6px 10px;font-size:12px}
  .form-footer{flex-direction:column}
  .form-footer button{width:100%}
  .btn-blue,.btn-gray{padding:10px 14px;font-size:13px}
  .login-box{padding:28px 20px;margin:16px}
}
@media(max-width:480px){
  .header-logo h1{font-size:13px}
  .tab-btn{padding:5px 8px;font-size:11px}
}

/* ── Dashboard ────────────────────────────────────────────────────────────── */
.stat-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px;text-align:center}
.stat-num{font-size:32px;font-weight:800;color:#0f4c81;line-height:1}
.stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-top:6px}
.stat-sub{font-size:13px;color:#64748b;margin-top:4px;font-weight:600}
.chart-wrap{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px;margin-bottom:18px}
.chart-title{font-weight:800;font-size:14px;color:#0f4c81;margin-bottom:4px}
.chart-sub{font-size:11px;color:#94a3b8;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.bar-label{width:90px;text-align:right;color:#64748b;flex-shrink:0;font-size:11px}
.bar-track{flex:1;background:#f1f5f9;border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;transition:width .4s}
.scatter-wrap{position:relative;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.dot{position:absolute;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;border:1.5px solid rgba(255,255,255,.8)}
.axis-label{font-size:10px;color:#94a3b8}

</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const KEYS = {users:"ptr_users_v1", patients:"ptr_db_v4", config:"ptr_config_v1"};

// ── Firebase config — REPLACE with your project values ───────────────────────
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDq4sZsyuDTAoD7X5jASrevHwQfDCcDrvA",
    authDomain: "protocolo-ptr.firebaseapp.com",
    projectId: "protocolo-ptr",
    storageBucket: "protocolo-ptr.firebasestorage.app",
    messagingSenderId: "435551180251",
    appId: "1:435551180251:web:5e500f7e8347ca522e03fe"
};

// ── Firebase init ─────────────────────────────────────────────────────────────
let db = null;
let FB_READY = false;

function initFirebase(){
  try {
    if(FIREBASE_CONFIG.projectId === "REEMPLAZAR") {
      console.warn("Firebase no configurado — usando solo localStorage");
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    FB_READY = true;
    console.log("Firebase conectado ✓");
    syncFromFirebase(); // load cloud data on startup
  } catch(e) {
    console.warn("Firebase error:", e.message);
  }
}

// ── Sync status ───────────────────────────────────────────────────────────────
let SYNC_STATUS = "local"; // "local" | "syncing" | "synced" | "error"
function setSyncStatus(s){
  SYNC_STATUS = s;
  const el = document.getElementById("sync-status");
  if(!el) return;
  const cfg = {
    local:   {color:"#94a3b8", icon:"💾", text:"Solo local"},
    syncing: {color:"#f59e0b", icon:"⟳",  text:"Sincronizando..."},
    synced:  {color:"#15803d", icon:"☁️",  text:"Sincronizado"},
    error:   {color:"#dc2626", icon:"⚠️",  text:"Error sync"},
  }[s] || {color:"#94a3b8", icon:"?", text:s};
  el.innerHTML = `<span style="color:${cfg.color};font-size:11px;font-weight:600">${cfg.icon} ${cfg.text}</span>`;
}

// ── Firestore collections ─────────────────────────────────────────────────────
const FS_COL = {
  patients:  "ptr_patients",
  controles: "ptr_controles",
  users:     "ptr_users",
  config:    "ptr_config",
};

// ── Load all data from Firestore ──────────────────────────────────────────────
async function syncFromFirebase(){
  if(!FB_READY) return;
  setSyncStatus("syncing");
  try {
    // Patients
    const pSnap = await db.collection(FS_COL.patients).get();
    if(!pSnap.empty){
      const pts = pSnap.docs.map(d=>({...d.data(), _fsId:d.id}));
      STATE.patients = pts;
      lsSet(KEYS.patients, pts);
    }
    // Controles
    const cSnap = await db.collection(FS_COL.controles).get();
    if(!cSnap.empty){
      const ctrls = cSnap.docs.map(d=>({...d.data(), _fsId:d.id}));
      lsSet("ptr_controles_v1", ctrls);
    }
    // Users
    const uSnap = await db.collection(FS_COL.users).get();
    if(!uSnap.empty){
      const users = uSnap.docs.map(d=>d.data());
      STATE.users = users;
      lsSet(KEYS.users, users);
    } else {
      // No users in Firestore yet — seed with defaults
      await fsSaveUsers(STATE.users);
    }
    // Config
    const cfSnap = await db.collection(FS_COL.config).doc("main").get();
    if(cfSnap.exists){
      STATE.config = cfSnap.data().config || STATE.config;
      lsSet(KEYS.config, STATE.config);
  fsSaveConfig(STATE.config);
    }
    setSyncStatus("synced");
    render();
  } catch(e) {
    console.warn("syncFromFirebase error:", e.message);
    setSyncStatus("error");
  }
}

// ── Save patient to Firestore ─────────────────────────────────────────────────
async function fsSetPatient(patient){
  if(!FB_READY) return;
  try {
    const docId = String(patient.id);
    await db.collection(FS_COL.patients).doc(docId).set(patient);
  } catch(e){ setSyncStatus("error"); }
}

async function fsDeletePatient(id){
  if(!FB_READY) return;
  try { await db.collection(FS_COL.patients).doc(String(id)).delete(); }
  catch(e){ setSyncStatus("error"); }
}

// ── Save control to Firestore ─────────────────────────────────────────────────
async function fsSetControl(ctrl){
  if(!FB_READY) return;
  try {
    await db.collection(FS_COL.controles).doc(String(ctrl.id)).set(ctrl);
  } catch(e){ setSyncStatus("error"); }
}

async function fsDeleteControl(id){
  if(!FB_READY) return;
  try { await db.collection(FS_COL.controles).doc(String(id)).delete(); }
  catch(e){ setSyncStatus("error"); }
}

// ── Save users to Firestore ───────────────────────────────────────────────────
async function fsSaveUsers(users){
  if(!FB_READY) return;
  try {
    const batch = db.batch();
    users.forEach(u=>{
      batch.set(db.collection(FS_COL.users).doc(String(u.id)), u);
    });
    await batch.commit();
  } catch(e){ setSyncStatus("error"); }
}

// ── Save config to Firestore ──────────────────────────────────────────────────
async function fsSaveConfig(config){
  if(!FB_READY) return;
  try {
    await db.collection(FS_COL.config).doc("main").set({config});
  } catch(e){ setSyncStatus("error"); }
}

const DEFAULT_USERS = [
  {id:1,name:"Dr. Fernandez",username:"fernandez",password:"Fernandez2024",role:"admin",active:true},
  {id:2,name:"Dr. Kosche",   username:"kosche",   password:"Kosche2024",   role:"user", active:true},
  {id:3,name:"Dr. Espinoza", username:"espinoza", password:"Espinoza2024", role:"user", active:true},
  {id:4,name:"Dr. Rubio",    username:"rubio",    password:"Rubio2024",    role:"user", active:true},
  {id:5,name:"Demo",         username:"demo",     password:"demo",         role:"demo", active:true},
];

const DEFAULT_CONFIG = {
  cirujanos:    ["Dr. Kosche","Dr. Espinoza","Dr. Fernandez","Dr. Rubio"],
  indicaciones: ["Gonartrosis primaria","Artritis reumatoidea","Post-traumática","Osteonecrosis","Otra"],
  cirugiaPrevia:["No","Artroscopia","Osteotomía","PTR contralateral","Otra"],
  tecnicas:     ["Convencional intramedular","Convencional extramedular","Mixto (endomed. fémur + extramed. tibia)","Navegación","PSI","Robótica"],
  implantes:    ["Sigma (DePuy)","Nexgen (Zimmer)","Triathlon (Stryker)","Attune (DePuy)","Persona (Zimmer)","Otro"],
  conservLCA:   ["PS (sacrifica LCA)","CR (conserva LCA)","UCR","No"],
  alturaRot:    ["Normal","Patela alta","Patela baja"],
  subluxRot:    ["No","Leve","Moderada","Severa"],
  infeccion:    ["No","Superficial","Profunda < 3m","Profunda > 3m"],
  tvp:          ["No","TVP","TEP","TVP + TEP"],
  rigidez:      ["No","Sí - conservador","Sí - manipulación","Sí - revisión"],
  aflojamiento: ["No","Femoral","Tibial","Ambos"],
};

const CONFIG_LABELS = {
  cirujanos:"Cirujanos",implantes:"Implantes",tecnicas:"Técnicas de corte",
  indicaciones:"Indicaciones",cirugiaPrevia:"Cirugía previa",conservLCA:"Conservación LCA",
  alturaRot:"Altura rotuliana",subluxRot:"Subluxación rotuliana",
  infeccion:"Infección",tvp:"TVP/TEP",rigidez:"Rigidez",aflojamiento:"Aflojamiento"
};

const TABS = [
  {id:"demografico",   label:"👤 Paciente"},
  {id:"preop_rx",      label:"🦴 RX Pre-op"},
  {id:"preop_scores",  label:"📊 Scores Pre"},
  {id:"quirurgico",    label:"🔧 Quirúrgico"},
  {id:"mako",          label:"🤖 Mako"},
  {id:"postop_rx",     label:"📐 RX Post-op"},
  {id:"controles",     label:"📅 Controles"},
  {id:"seguimiento",   label:"📋 Seguimiento"},
];

// ── State ─────────────────────────────────────────────────────────────────────
let STATE = {
  user: null,
  users: lsGet(KEYS.users, DEFAULT_USERS),
  config: lsGet(KEYS.config, DEFAULT_CONFIG),
  patients: lsGet(KEYS.patients, []),
  view: "list",       // list | form | config
  tab: "demografico",
  editId: null,
  form: emptyForm(),
  configSec: "listas",
  editListKey: null,
  editListDraft: [],
  pwdTarget: null,
  savedFlash: false,
  configFlash: "",
  customFields: lsGet("ptr_customFields_v1", []),
  cfNew: {label:"",type:"text",section:"demografico"},
  dashView: "stats",  // stats | custom
  customChart: {xKey:"ejeMecanico",yKey:"ejeMecanico_post",groupKey:""},
  currentControles: [],
  modal: null,
};

// ── Storage ───────────────────────────────────────────────────────────────────
function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── Empty form ────────────────────────────────────────────────────────────────
function emptyForm(){
  return {
    id:Date.now(),fechaRegistro:new Date().toISOString().split("T")[0],
    nombre:"",rut:"",fechaNac:"",edad:"",correo:"",sexo:"",lado:"",imc:"",asa:"",
    dm:"",hta:"",tabaco:"",anticoagulacion:"",indicacion:"",tiempoEvolucion:"",cirugiaPrevia:"",
    kellgren:"",morfotipo:"",varo_valgo_clinico:"",ejeMecanico:"",vca:"",mad:"",
    aLDFA:"",mLDFA:"",mpta:"",jlca:"",tibialSlope:"",pco_pre:"",aco_pre:"",is_pre:"",alturaRotuliana:"",subluxRotuliana:"",extension_pre:"",flexion_pre:"",
    kssKnee_pre:"",kssFuncion_pre:"",womac_pre:"",oxford_pre:"",vas_pre:"",tug_pre:"",
    cirujano:"",fechaCx:"",implante:"",tamFemur:"",tamTibia:"",tamInserto:"",tamRotula:"",
    tecnica:"",conservacionLca:"",liberaciones:"",patella_resurfacing:"",tourniquet:"",tiempoCirugia:"",sangrado:"",
    ejeMecanico_post:"",mad_post:"",mLDFA_post:"",dffa:"",atfa:"",tibialSlope_post:"",pco_post:"",aco_post:"",is_post:"",altura_rotuliana_post:"",
    // post-op scores now stored in controles system (not in patient form)
    infeccion:"",tvp_tep:"",rigidez:"",aflojamiento:"",fractura_periprotesica:"",
    revision:"",otras_complicaciones:"",notas:"",
    mako_usado:"",
    // Plan vs Real
    mako_hka_plan:"",mako_hka_real:"",mako_dffa_plan:"",mako_dffa_real:"",
    mako_atfa_plan:"",mako_atfa_real:"",mako_slope_plan:"",mako_slope_real:"",
    // Laxitud pre-implantación
    mako_lax_pre_ext_med:"",mako_lax_pre_ext_lat:"",mako_lax_pre_flex_med:"",mako_lax_pre_flex_lat:"",
    // Laxitud post-implantación
    mako_lax_post_ext_med:"",mako_lax_post_ext_lat:"",mako_lax_post_flex_med:"",mako_lax_post_flex_lat:"",
    // Gaps
    mako_flex_gap_med:"",mako_flex_gap_lat:"",mako_ext_gap_med:"",mako_ext_gap_lat:"",
    mako_balance_flex:"",mako_balance_ext:"",
    // Rotaciones femorales
    mako_rot_fem_coronal:"",mako_rot_fem_transverso:"",mako_rot_fem_sagital:"",
    // Resecciones femorales
    mako_res_fem_distal_med:"",mako_res_fem_distal_lat:"",
    mako_res_fem_post_med:"",mako_res_fem_post_lat:"",
    // Rotaciones tibiales
    mako_rot_tib_coronal:"",mako_rot_tib_transverso:"",mako_rot_tib_sagital:"",
    // Resecciones tibiales
    mako_res_tib_prox_med:"",mako_res_tib_prox_lat:"",

// ── Date helpers ──────────────────────────────────────────────────────────────
const DAYS   = Array.from({length:31},(_,i)=>String(i+1).padStart(2,"0"));
const CY     = new Date().getFullYear();

function dateInpHTML(key, disabled, autoAge){
  const dis = disabled ? "disabled" : "";
  const val = STATE.form[key]||"";
  const bg  = disabled ? "#f1f5f9" : "#f8fafc";
  const onChange = autoAge
    ? `onchange="setFormField('${key}',this.value);calcEdad(this.value)"`
    : `onchange="setFormField('${key}',this.value)"`;
  return `<input type="date" value="${val}" ${dis} ${onChange} style="width:100%;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:14px;color:#1e293b;background:${bg};outline:none">`;
}
function calcEdad(fechaNac){
  if(!fechaNac){ STATE.form.edad=""; updateEdadDisplay(); return; }
  const hoy=new Date(), nac=new Date(fechaNac);
  let e=hoy.getFullYear()-nac.getFullYear();
  const mo=hoy.getMonth()-nac.getMonth();
  if(mo<0||(mo===0&&hoy.getDate()<nac.getDate())) e--;
  STATE.form.edad=(e>=0&&e<130)?String(e):"";
  updateEdadDisplay();
}
function updateEdadDisplay(){
  const el=document.getElementById("edad-display");
  if(el) el.textContent=STATE.form.edad?STATE.form.edad+" años":"—";
}

// ── Render helpers ────────────────────────────────────────────────────────────
function field(label, html, span=1){
  return `<div class="field${span>1?" span-"+span:""}"><label>${label}</label>${html}</div>`;
}
function txtInp(key, placeholder="", disabled=false){
  const dis = disabled?"disabled":"";
  const val = (STATE.form[key]||"").replace(/"/g,"&quot;");
  return `<input type="text" value="${val}" placeholder="${placeholder}" ${dis} oninput="setFormField('${key}',this.value)">`;
}
function numInp(key, placeholder="", step="", min="", max="", disabled=false){
  const dis = disabled?"disabled":"";
  const val = STATE.form[key]||"";
  const attrs = [step?`step="${step}"`:"",min?`min="${min}"`:"",max?`max="${max}"`:""].filter(Boolean).join(" ");
  return `<input type="number" value="${val}" placeholder="${placeholder}" ${attrs} ${dis} oninput="setFormField('${key}',this.value)">`;
}
function selInp(key, opts, disabled=false){
  const dis = disabled?"disabled":"";
  const cur = STATE.form[key]||"";
  const options = opts.map(o=>`<option value="${o}"${cur===o?" selected":""}>${o}</option>`).join("");
  return `<select ${dis} onchange="setFormField('${key}',this.value)"><option value="">— Seleccionar —</option>${options}</select>`;
}
function secTitle(icon, title, sub=""){
  return `<div class="sec-title"><span class="icon">${icon}</span><div><h3>${title}</h3>${sub?`<p>${sub}</p>`:""}</div></div>`;
}
function infoBox(html, cls="info-blue"){
  return `<div class="info-box ${cls}">${html}</div>`;
}

// ── Custom fields renderer ────────────────────────────────────────────────────
function customFieldsHTML(sectionId, ro){
  const fields = STATE.customFields.filter(f=>f.section===sectionId);
  if(!fields.length) return "";
  const items = fields.map(f=>{
    const key=f.key;
    if(f.type==="number"){
      return field(f.label, numInp(key,"","","","",ro));
    } else if(f.type==="select"){
      return field(f.label, selInp(key, f.opts||[], ro));
    } else {
      return field(f.label, txtInp(key,"",ro));
    }
  }).join("");
  return `<div style="margin-top:13px;border-top:2px dashed #e2e8f0;padding-top:13px">
    <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">&#10133; Campos personalizados</div>
    <div class="grid-3">${items}</div>
  </div>`;
}

function tabControles(pacienteId, ro){
  // Sort controls chronologically by periodo then fecha
  const periodoOrder = PERIODOS.map(p=>p.id);
  const controles = [...STATE.currentControles].sort((a,b)=>{
    const pi = periodoOrder.indexOf(a.periodo) - periodoOrder.indexOf(b.periodo);
    if(pi!==0) return pi;
    return (a.fecha||"").localeCompare(b.fecha||"");
  });

  const addBtn = !ro ? `<button onclick="addControl('${pacienteId}')"
    style="margin-bottom:14px;padding:11px 20px;border:2px dashed #cbd5e1;border-radius:10px;background:transparent;color:#64748b;font-weight:600;font-size:14px;cursor:pointer;width:100%">
    + Agregar control de seguimiento
  </button>` : "";

  if(!controles.length){
    return `<div>${addBtn}<div class="empty-state"><div class="big">📅</div><strong>Sin controles registrados</strong><p style="font-size:13px;margin-top:6px">Agregue el primer control para comenzar el seguimiento</p></div></div>`;
  }

  const COL_W = 160; // px per control column
  const LBL_W = 170; // px for label column
  const totalW = LBL_W + controles.length * COL_W;

  // ── Score button ──────────────────────────────────────────────────────────
  const sBtn=(label,scoreKey,ctrlIdx,val,color)=>`
    <button onclick="${ro?'':`openScoreModal('${scoreKey}',${ctrlIdx})`}"
      style="width:${COL_W-20}px;padding:6px 8px;border-radius:6px;border:2px solid ${val?color:"#e2e8f0"};background:${val?color+"18":"#f8fafc"};cursor:${ro?"default":"pointer"};text-align:center;display:block">
      <div style="font-size:16px;font-weight:800;color:${val?color:"#cbd5e1"}">${val||"—"}</div>
      <div style="font-size:9px;color:#94a3b8">${val?"calculado":ro?"":"completar"}</div>
    </button>`;

  // ── Input ─────────────────────────────────────────────────────────────────
  const inp=(ci,key,val,type="number",step="1",ph="")=>`
    <input type="${type}" value="${val||""}" step="${step}" placeholder="${ph}" ${ro?"disabled":""}
      oninput="updateControl(${ci},'${key}',this.value)"
      style="width:${COL_W-20}px;padding:5px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;background:#f8fafc;outline:none;display:block">`;

  const sel=(ci,key,val,opts)=>`
    <select ${ro?"disabled":""} onchange="updateControl(${ci},'${key}',this.value)"
      style="width:${COL_W-20}px;padding:5px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;background:#f8fafc;outline:none;cursor:pointer;display:block">
      <option value="">—</option>
      ${opts.map(o=>`<option value="${o}"${val===o?" selected":""}>${o}</option>`).join("")}
    </select>`;

  // ── Column headers ────────────────────────────────────────────────────────
  const thCols = controles.map((ctrl,i)=>{
    const pLabel = PERIODOS.find(p=>p.id===ctrl.periodo)?.label||"Sin período";
    const fechaStr = ctrl.fecha ? ctrl.fecha.split("-").reverse().join("/") : "—";
    return `<th style="width:${COL_W}px;min-width:${COL_W}px;max-width:${COL_W}px;padding:10px 10px;background:#0f4c81;color:#fff;font-weight:700;font-size:12px;text-align:center;border-right:1px solid rgba(255,255,255,.2);vertical-align:top">
      <div style="font-size:13px;font-weight:800">${pLabel}</div>
      <div style="font-size:11px;opacity:.8;margin:3px 0">${fechaStr}</div>
      ${!ro?`<div style="display:flex;gap:4px;justify-content:center;margin-top:6px">
        <select onchange="updateControl(${i},'periodo',this.value)"
          style="font-size:10px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;max-width:90px">
          ${PERIODOS.map(p=>`<option value="${p.id}"${ctrl.periodo===p.id?" selected":""}>${p.label}</option>`).join("")}
        </select>
        <button onclick="deleteControl(${i})" style="background:rgba(220,38,38,.8);color:#fff;border:none;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer">✕</button>
      </div>
      <input type="date" value="${ctrl.fecha||""}" onchange="updateControl(${i},'fecha',this.value)"
        style="margin-top:5px;font-size:10px;padding:2px 4px;border-radius:4px;border:none;background:rgba(255,255,255,.2);color:#fff;outline:none;width:${COL_W-24}px">
      `:""}

  const TH_LBL = `padding:8px 14px;border-bottom:1px solid #f1f5f9;background:#f8fafc;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.05em;width:${LBL_W}px;min-width:${LBL_W}px;max-width:${LBL_W}px`;

  const row=(label,sub,cellFn)=>`<tr>
    <td style="${TH_LBL}">${label}${sub?`<div style="font-size:9px;color:#94a3b8;font-weight:400;text-transform:none;margin-top:1px">${sub}</div>`:""}</td>
    ${controles.map((ctrl,i)=>`<td style="${TD}">${cellFn(ctrl,i)}</td>`).join("")}

  const rows = [
    row("KSS Knee","médico · /100",     (ctrl,i)=>sBtn("KSS Knee","kss_knee",i,ctrl.kss_knee,"#0f4c81")),
    row("KSS Function","médico · /100", (ctrl,i)=>sBtn("KSS Function","kss_func",i,ctrl.kss_func,"#1e6fb5")),
    row("Oxford","paciente · /48",      (ctrl,i)=>sBtn("Oxford","oxford",i,ctrl.oxford,"#7c3aed")),
    row("WOMAC","paciente · /96",       (ctrl,i)=>sBtn("WOMAC","womac",i,ctrl.womac_total,"#0891b2")),
    row("VAS","paciente · 0–10",        (ctrl,i)=>inp(i,"vas",ctrl.vas,"number","0.5","0–10")),
    row("TUG Test","segundos",          (ctrl,i)=>inp(i,"tug",ctrl.tug,"number","0.1","seg")),
    row("Extensión","°",                (ctrl,i)=>inp(i,"extension",ctrl.extension,"number","1","0°")),
    row("Flexión","°",                  (ctrl,i)=>inp(i,"flexion",ctrl.flexion,"number","1","120°")),
    row("Arco","°",                     (ctrl,i)=>{
      const f=Number(ctrl.flexion||0),e=Number(ctrl.extension||0);
      return `<div id="arco-${i}" style="padding:5px 8px;background:#f0fdf4;border-radius:6px;font-weight:700;color:#15803d;text-align:center;font-size:14px">${f>0&&f>e?f-e+"°":"—"}</div>`;
    }),
    row("Dolor palp.","palpación",      (ctrl,i)=>sel(i,"dolor_palp",ctrl.dolor_palp,["No","Leve","Moderado","Severo"])),
    row("Derrame","articular",          (ctrl,i)=>sel(i,"derrame",ctrl.derrame,["No","Leve","Moderado","Severo"])),
    row("Notas","",                     (ctrl,i)=>`<textarea ${ro?"disabled":""} oninput="updateControl(${i},'notas',this.value)"
      style="width:${COL_W-20}px;padding:5px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;background:#f8fafc;outline:none;min-height:50px;resize:vertical;display:block">${(ctrl.notas||"").replace(/</g,"&lt;")}</textarea>`),
  ].join("");

  return `<div>
    ${addBtn}
    <div style="overflow-x:auto">
      <table style="border-collapse:collapse;width:${totalW}px;table-layout:fixed">
        <colgroup>
          <col style="width:${LBL_W}px">
          ${controles.map(()=>`<col style="width:${COL_W}px">`).join("")}
        </colgroup>
        <thead><tr>
          <th style="width:${LBL_W}px;padding:8px 14px;background:#1e293b;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:left">Medición</th>
          ${thCols}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:8px;font-size:11px;color:#94a3b8">💡 Clic en los botones para abrir la calculadora · Los demás campos se guardan al escribir</div>
  </div>`;
}

function addControl(pacienteId){
  const ctrl=emptyControl(Number(pacienteId));
  const all=getControles();
  all.push(ctrl);
  saveControles(all);
  setSyncStatus("syncing"); fsSetControl(ctrl).then(()=>setSyncStatus("synced"));
  STATE.currentControles = all.filter(x=>Number(x.pacienteId)===Number(pacienteId));
  render();
}

function updateControl(idx,key,val){
  STATE.currentControles[idx][key]=val;
  const all=getControles();
  const ci=all.findIndex(c=>Number(c.id)===Number(STATE.currentControles[idx].id));
  if(ci>=0) all[ci]={...STATE.currentControles[idx]}; else all.push({...STATE.currentControles[idx]});
  saveControles(all);
  setSyncStatus("syncing"); fsSetControl({...STATE.currentControles[idx]}).then(()=>setSyncStatus("synced"));
  // Update arco display without full re-render (keeps focus)
  if(key==="flexion"||key==="extension"){
    const ctrl=STATE.currentControles[idx];
    const f=Number(ctrl.flexion||0), e=Number(ctrl.extension||0);
    const arcoEl=document.getElementById("arco-"+idx);
    if(arcoEl) arcoEl.textContent=(f&&f>e)?f-e+"°":"—";
  }
}

function deleteControl(idx){
  if(!confirm("¿Eliminar este control?")) return;
  const ctrl=STATE.currentControles[idx];
  const all=getControles().filter(c=>Number(c.id)!==Number(ctrl.id));
  saveControles(all);
  fsDeleteControl(ctrl.id);
  STATE.currentControles=STATE.currentControles.filter((_,i)=>i!==idx);
  render();
}


// ── Controles storage ─────────────────────────────────────────────────────────
function saveControles(arr){ lsSet("ptr_controles_v1",arr); }
function getControles(){ return lsGet("ptr_controles_v1",[]); }
function getControlesPaciente(pid){
  const npid=Number(pid);
  return getControles().filter(c=>Number(c.pacienteId)===npid)
    .sort((a,b)=>{
      const order=["preop","6m","12m","24m","3-5a","5-9a","10a+"];
      return order.indexOf(a.periodo)-order.indexOf(b.periodo);
    });
}

// ── Score modal ───────────────────────────────────────────────────────────────
function openScoreModal(scoreKey, controlIdx){
  const ctrl = STATE.currentControles[controlIdx]||{};
  const existing = ctrl[scoreKey];
  const scoreDefKey = scoreKey.replace(/_\d+m$|_preop$|_\d+-\d+a$|_\d+a\+$/,'')
    .replace(/^(kss_knee|kss_func|oxford|womac)_.*/,'$1');
  const sd = scoreKey.startsWith('kss_knee')?'kss_knee':
             scoreKey.startsWith('kss_func')?'kss_func':
             scoreKey.startsWith('oxford')?'oxford':
             scoreKey.startsWith('womac')?'womac':scoreKey;
  const scoreDef = sd;
  let initValues = {};
  if(existing && SCORES[scoreDef]){
    SCORES[scoreDef].secciones.forEach(sec=>{ initValues[sec.key]=ctrl[sec.key]||""; });
  }
  STATE.modal={ scoreKey, controlIdx, values:initValues, scoreDef };
  render();
}

function closeModal(){ STATE.modal=null; render(); }

function modalSetVal(key,val){
  if(!STATE.modal) return;
  STATE.modal.values[key]=val;
  const el=document.getElementById("score-modal-body");
  if(el){ el.scrollTop=el._savedScroll||0; }
  render();
  const el2=document.getElementById("score-modal-body");
  if(el2 && el2._savedScroll!==undefined) el2.scrollTop=el2._savedScroll;
}

function saveScoreModal(){
  if(!STATE.modal) return;
  const {scoreKey,controlIdx,values,scoreDef}=STATE.modal;
  const ctrl=STATE.currentControles[controlIdx];
  if(!ctrl) return;
  const all=getControles();
  const idx=all.findIndex(c=>Number(c.id)===Number(ctrl.id));
  if(idx===-1) return;

  if(scoreDef==='kss_knee'||scoreDef==='kss_func'){
    const hasAnyKSS=SCORES[scoreDef].secciones.some(sec=>values[sec.key]!==""&&values[sec.key]!==undefined);
    let total=0;
    SCORES[scoreDef].secciones.forEach(sec=>{
      const v=values[sec.key];
      all[idx][sec.key]=v;
      if(sec.tipo==="slider"){ total+=sec.calc(Number(v||0)); }
      else if(v!==""&&v!==undefined){ total+=Number(String(v).split(":")[0]); }
    });
    all[idx][scoreKey]=hasAnyKSS?total:"";
  } else if(scoreDef==='oxford'){
    const complete=OXFORD_ITEMS.every((_,i)=>values["ox_"+i]!==""&&values["ox_"+i]!==undefined);
    const allFilled=Object.keys(values).length===OXFORD_ITEMS.length;
    if(complete&&allFilled){
      const total=OXFORD_ITEMS.reduce((s,_,i)=>s+Number(values["ox_"+i]),0);
      all[idx][scoreKey]=total;
      all[idx][scoreKey+"_vals"]=JSON.stringify(values);
    } else { all[idx][scoreKey]=""; }
  } else if(scoreDef==='womac'){
    const allDone=WOMAC_ITEMS.every((_,i)=>values["wom_"+i]!==""&&values["wom_"+i]!==undefined);
    if(allDone){
      const total=WOMAC_ITEMS.reduce((s,_,i)=>s+Number(values["wom_"+i]),0);
      const dolor=WOMAC_ITEMS.slice(0,5).reduce((s,_,i)=>s+Number(values["wom_"+i]),0);
      const rigidez=WOMAC_ITEMS.slice(5,7).reduce((s,_,i)=>s+Number(values["wom_"+(5+i)]),0);
      const func=WOMAC_ITEMS.slice(7).reduce((s,_,i)=>s+Number(values["wom_"+(7+i)]),0);
      all[idx][scoreKey]=total;
      all[idx][scoreKey+"_dolor"]=dolor;
      all[idx][scoreKey+"_rigidez"]=rigidez;
      all[idx][scoreKey+"_func"]=func;
    } else { all[idx][scoreKey]=""; }
  }

  saveControles(all);
  setSyncStatus("syncing"); fsSetControl({...all[idx]}).then(()=>setSyncStatus("synced"));
  STATE.currentControles=getControlesPaciente(ctrl.pacienteId);
  closeModal();
}

    if(allDone){
      const total=WOMAC_ITEMS.reduce((s,_,i)=>s+Number(values["wom_"+i]),0);

function sortList(col){

  else { STATE.sortCol=col; STATE.sortDir="asc"; }
  render();
}

// ── renderConfig ──────────────────────────────────────────────────────────────
function renderList(){
  const demo = STATE.user.role==="demo";
  const q = (STATE.listFilter||"").toLowerCase();

  let pts = STATE.patients.filter(p=>{
    if(!q) return true;
    return Object.values(p).some(v=>String(v||"").toLowerCase().includes(q));
  });

  // Sort
  if(STATE.sortCol){
    pts=pts.slice().sort((a,b)=>{
      let va=a[STATE.sortCol]??"", vb=b[STATE.sortCol]??"";
      if(!isNaN(Number(va))&&!isNaN(Number(vb))&&va!==""&&vb!==""){va=Number(va);vb=Number(vb);}
      if(va<vb) return STATE.sortDir==="asc"?-1:1;
      if(va>vb) return STATE.sortDir==="asc"?1:-1;
      return 0;
    });
  }

  // Detect duplicate RUTs
  const rutGroups={};
  STATE.patients.forEach(p=>{
    if(!p.rut) return;
    if(!rutGroups[p.rut]) rutGroups[p.rut]=[];
    rutGroups[p.rut].push(p.fechaCx||"");
  });

  const PERIODOS=[
    {period:"preop",label:"Pre-op"},
    {period:"6m",label:"6m"},
    {period:"12m",label:"12m"},
    {period:"24m",label:"24m"},
    {period:"3-5a",label:"3-5a"},
    {period:"5-9a",label:"5-9a"},
    {period:"10a+",label:"10a+"},
  ];

  const COLS=[
    {key:"nombre",         label:"Paciente"},
    {key:"cirujano",       label:"Cirujano"},
    {key:"lado",           label:"Lado"},
    {key:"fechaCx",        label:"Fecha Cx"},
    {key:"implante",       label:"Implante"},
    {key:"sexo",           label:"Sexo"},
    {key:"edad",           label:"Edad"},
    {key:"kellgren",       label:"K-L"},
    {key:"ejeMecanico",    label:"HKA Pre"},
    {key:"mad",            label:"MAD Pre"},
    {key:"ejeMecanico_post",label:"HKA Post"},
    {key:"mad_post",       label:"MAD Post"},
    {key:"tecnica",        label:"Técnica"},
  ];

  const ctrlCols=[];
  PERIODOS.forEach(pg=>{
    ctrlCols.push({period:pg.period, label:pg.label+" KSS",   scoreField:"kss_knee"});
    ctrlCols.push({period:pg.period, label:pg.label+" Oxford", scoreField:"oxford"});
    ctrlCols.push({period:pg.period, label:pg.label+" VAS",    scoreField:"vas"});
  });

  const allControles=getControles();

  const thStyle=(key)=>`padding:10px 10px;white-space:nowrap;cursor:pointer;user-select:none;font-size:11px;
    text-transform:uppercase;letter-spacing:.05em;color:#64748b;font-weight:700;
    background:#f8fafc;border-bottom:2px solid #e2e8f0;`;

  const sortArrow=(key)=>STATE.sortCol===key?(STATE.sortDir==="asc"?" ↑":" ↓"):" ↕";

  const headers=[
    `<th style="${thStyle("n")}">#</th>`,
    ...COLS.map(col=>`<th onclick="sortList('${col.key}')" style="${thStyle(col.key)}">${col.label}${sortArrow(col.key)}</th>`),
    ...ctrlCols.map(cc=>`<th style="${thStyle("")}">${cc.label}</th>`),
    `<th style="${thStyle("")}">Acciones</th>`,
  ].join("");

  const rows=pts.map((p,pi)=>{
    const hkaPre=Number(p.ejeMecanico);
    const hkaPost=Number(p.ejeMecanico_post);
    const hkaBad=Math.abs(hkaPre)>3;
    const hkaPostBad=p.ejeMecanico_post!==""&&Math.abs(hkaPost)>3;

    let badge="";
    if(p.rut && rutGroups[p.rut] && rutGroups[p.rut].length>1){
      const dates=rutGroups[p.rut];
      const sameDate=dates.every(d=>d===dates[0]&&d!=="");
      if(sameDate)
        badge=` <span title="Cirugía bilateral — mismo acto quirúrgico" style="background:#fef9c3;color:#854d0e;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700">bilateral</span>`;
      else
        badge=` <span title="Este paciente tiene otro registro en la base de datos" style="background:#e0f2fe;color:#0369a1;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700">2 registros</span>`;
    }

    const ptControles=allControles.filter(ct=>Number(ct.pacienteId)===Number(p.id));

    const tdStyle="padding:8px 10px;white-space:nowrap;border-bottom:1px solid #f1f5f9;font-size:13px;";

    const baseCells=COLS.map(col=>{
      if(col.key==="nombre")
        return `<td style="${tdStyle}"><strong>${p.nombre||"—"}</strong>${badge}</td>`;
      if(col.key==="ejeMecanico")
        return `<td style="${tdStyle}color:${hkaBad?"#dc2626":"#15803d"};font-weight:${hkaBad?"700":"400"}">${p.ejeMecanico!==""?p.ejeMecanico+"°":"—"}</td>`;
      if(col.key==="ejeMecanico_post")
        return `<td style="${tdStyle}color:${hkaPostBad?"#dc2626":"#15803d"};font-weight:${hkaPostBad?"700":"400"}">${p.ejeMecanico_post!==""?p.ejeMecanico_post+"°":"—"}</td>`;
      const val=p[col.key]??"";
      return `<td style="${tdStyle}">${val||"—"}</td>`;
    }).join("");

    const ctrlCells=ctrlCols.map(cc=>{
      const ctrl=ptControles.find(ct=>ct.periodo===cc.period);
      let val="";
      if(ctrl){
        const sf=cc.scoreField;
        const v=ctrl[sf];
        val=(v!==""&&v!==undefined)?v:"";
      }
      // Preop fallback from form
      if(!val && cc.period==="preop"){
        if(cc.scoreField==="kss_knee") val=p.kssKnee_pre||"";
        if(cc.scoreField==="oxford") val=p.oxford_pre||"";
        if(cc.scoreField==="vas") val=p.vas_pre||"";
      }
      return `<td style="${tdStyle}text-align:center">${val||"—"}</td>`;
    }).join("");

    const actions=`<td style="${tdStyle}">
      <div style="display:flex;gap:6px">
        <button onclick="editPatient(${p.id})" style="padding:5px 10px;background:#dbeafe;color:#1e40af;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600">✏️ Editar</button>
        ${!demo?`<button onclick="delPatient(${p.id})" style="padding:5px 10px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;cursor:pointer;font-size:12px">✕</button>`:""}
        <button onclick="exportPDF(${p.id})" style="padding:5px 10px;background:#f0fdf4;color:#15803d;border:none;border-radius:5px;cursor:pointer;font-size:12px">📄 PDF</button>
      </div>
    </td>`;

    const rowBg=pi%2===0?"#fff":"#fafafa";
    return `<tr style="background:${rowBg}">
      <td style="${tdStyle}color:#94a3b8">${String(pi+1).padStart(3,"0")}</td>
      ${baseCells}${ctrlCells}${actions}
    </tr>`;
  }).join("");

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <h2 style="margin:0;font-size:18px;color:#0f4c81">📋 Pacientes (${pts.length})</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div id="sync-status" style="padding:4px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px"></div>
        <button class="btn-gray" onclick="syncFromFirebase()" title="Sincronizar" style="padding:6px 10px">☁️</button>
        <input id="list-search" type="text" placeholder="🔍 Buscar..." value="${STATE.listFilter||""}"
          oninput="filterList()"
          style="padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none;width:180px">
        ${!demo?`<button onclick="newPatient()" class="btn-primary" style="padding:8px 16px">+ Nuevo paciente</button>`:""}
        <button onclick="doExport()" class="btn-gray">📥 Excel</button>
      </div>
    </div>
    ${pts.length===0?`<div style="text-align:center;padding:40px;color:#94a3b8">
      ${STATE.patients.length===0?"No hay pacientes registrados aún.":"No se encontraron resultados."}
    </div>`:`
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:900px">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`}
  </div>`;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const pts = STATE.patients;
  if(pts.length===0) return `<div class="empty-state"><div class="big">&#128202;</div><strong style="font-size:15px;color:#64748b">Sin datos para mostrar</strong><p style="font-size:13px;margin-top:6px">Carg\u00e1 pacientes primero</p></div>`;

  const dv = STATE.dashView;

  // ── Helpers ──
  const nums = (arr,key) => arr.map(p=>p[key]).filter(v=>v!==""&&!isNaN(Number(v))).map(Number);
  const avg  = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "—";
  const pct  = (n,d) => d ? Math.round(n/d*100) : 0;

  // ── KPIs ──
  const hkaPre  = nums(pts,"ejeMecanico");
  const hkaPost = nums(pts,"ejeMecanico_post");
  const hkaOK   = hkaPost.filter(v=>Math.abs(v)<=3).length;
  const kssPre  = nums(pts,"kssKnee_pre");
  const allCtrlsD = getControles();
  const kssPostArr = pts.map(p=>{
    const pc=allCtrlsD.filter(x=>Number(x.pacienteId)===Number(p.id)&&x.kss_knee!=="");
    return pc.length ? Number(pc[pc.length-1].kss_knee) : NaN;
  }).filter(x=>!isNaN(x));
  const kssPost = kssPostArr;
  const vasPre  = nums(pts,"vas_pre");
  const vasPost = pts.map(p=>{
    const pc=allCtrlsD.filter(x=>Number(x.pacienteId)===Number(p.id)&&x.vas!=="");
    return pc.length ? Number(pc[pc.length-1].vas) : NaN;
  }).filter(x=>!isNaN(x));
  const oxPre   = nums(pts,"oxford_pre");
  const oxPost  = pts.map(p=>{
    const pc=allCtrlsD.filter(x=>Number(x.pacienteId)===Number(p.id)&&x.oxford!=="");
    return pc.length ? Number(pc[pc.length-1].oxford) : NaN;
  }).filter(x=>!isNaN(x));
  const withPost = pts.filter(p=>p.ejeMecanico_post!=="").length;

  const kpiGrid = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px">
    <div class="stat-card"><div class="stat-num">${pts.length}</div><div class="stat-label">Pacientes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#15803d">${withPost>0?pct(hkaOK,withPost)+"%":"—"}</div><div class="stat-label">HKA ±3° post-op</div><div class="stat-sub">${hkaOK}/${withPost} casos</div></div>
    <div class="stat-card"><div class="stat-num">${avg(hkaPre)}°</div><div class="stat-label">HKA Pre promedio</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#15803d">${avg(hkaPost)}°</div><div class="stat-label">HKA Post promedio</div></div>
    <div class="stat-card"><div class="stat-num">${avg(kssPre)}</div><div class="stat-label">KSS Pre</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#15803d">${avg(kssPost)}</div><div class="stat-label">KSS Post</div></div>
    <div class="stat-card"><div class="stat-num">${avg(vasPre)}</div><div class="stat-label">VAS Pre</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#15803d">${avg(vasPost)}</div><div class="stat-label">VAS Post</div></div>
  </div>`;

  // ── Bar chart helper ──
  function barChart(title, sub, data, color){
    const max = Math.max(...data.map(d=>d.v),1);
    const bars = data.map(d=>`<div class="bar-row">
      <div class="bar-label">${d.l}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct(d.v,max)}%;background:${color}">${d.v}</div></div>
    </div>`).join("");
    return `<div class="chart-wrap"><div class="chart-title">${title}</div><div class="chart-sub">${sub}</div>${bars}</div>`;
  }

  // ── Count helper ──
  function countBy(key){
    const map={};
    pts.forEach(p=>{ const v=p[key]||"Sin dato"; map[v]=(map[v]||0)+1; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v}));
  }

  // ── HKA improvement scatter ──
  function scatterHKA(){
    const pairs = pts.filter(p=>p.ejeMecanico!==""&&p.ejeMecanico_post!=="").map(p=>({
      pre:Number(p.ejeMecanico), post:Number(p.ejeMecanico_post), nombre:p.nombre||"?", id:p.id
    }));
    if(!pairs.length) return `<div class="chart-wrap"><div class="chart-title">&#127919; Correcci\u00f3n HKA: Pre vs Post</div><div style="color:#94a3b8;font-size:13px;padding:20px">Sin datos post-op</div></div>`;
    const allV = [...pairs.map(p=>p.pre),...pairs.map(p=>p.post)];
    const minV=Math.min(...allV)-2, maxV=Math.max(...allV)+2, range=maxV-minV||1;
    const W=320,H=220,PAD=40;
    const sx = v=>PAD+(v-minV)/range*(W-PAD*2);
    const sy = v=>H-PAD-(v-minV)/range*(H-PAD*2);
    const dots = pairs.map(p=>{
      const x1=sx(p.pre),y1=sy(p.pre),x2=sx(p.post),y2=sy(p.post);
      const col=Math.abs(p.post)<=3?"#15803d":"#dc2626";
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="1.5" stroke-dasharray="3,2" opacity=".5"/>
        <circle cx="${x1}" cy="${y1}" r="5" fill="#94a3b8" stroke="#fff" stroke-width="1.5"><title>${p.nombre} Pre: ${p.pre}°</title></circle>
        <circle cx="${x2}" cy="${y2}" r="5" fill="${col}" stroke="#fff" stroke-width="1.5"><title>${p.nombre} Post: ${p.post}°</title></circle>`;
    }).join("");
    // Zero line
    const z=sy(0);
    const zx1=sx(minV), zx2=sx(maxV);
    // Axis ticks
    const ticks=[];
    for(let v=Math.ceil(minV);v<=Math.floor(maxV);v+=2){
      ticks.push(`<line x1="${sx(v)}" y1="${H-PAD}" x2="${sx(v)}" y2="${H-PAD+4}" stroke="#e2e8f0"/>
        <text x="${sx(v)}" y="${H-PAD+14}" text-anchor="middle" font-size="9" fill="#94a3b8">${v}°</text>
        <line x1="${PAD-4}" y1="${sy(v)}" x2="${PAD}" y2="${sy(v)}" stroke="#e2e8f0"/>
        <text x="${PAD-6}" y="${sy(v)+3}" text-anchor="end" font-size="9" fill="#94a3b8">${v}°</text>`);
    }
    return `<div class="chart-wrap">
      <div class="chart-title">&#127919; Correcci\u00f3n HKA: Pre vs Post</div>
      <div class="chart-sub">Cada l\u00ednea = un paciente · Verde = objetivo ±3° · Gris = pre-op · Color = post-op</div>
      <div style="overflow-x:auto">
        <svg width="${W}" height="${H}" style="display:block;margin:0 auto">
          <rect width="${W}" height="${H}" fill="#f8fafc" rx="6"/>
          ${ticks.join("")}
          <line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          <line x1="${zx1}" y1="${z}" x2="${zx2}" y2="${z}" stroke="#0f4c81" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>
          <rect x="${sx(-3)}" y="${PAD}" width="${sx(3)-sx(-3)}" height="${H-PAD*2}" fill="#dcfce7" opacity=".3"/>
          ${dots}
          <text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="10" fill="#64748b">Pre-op / Post-op (°)</text>
          <text x="10" y="${H/2}" text-anchor="middle" font-size="10" fill="#64748b" transform="rotate(-90,10,${H/2})">Eje Mec\u00e1nico (°)</text>
        </svg>
      </div>
    </div>`;
  }

  // ── KSS improvement ──
  function kssImprovement(){
    const allC = getControles();
  const pairs=pts.filter(p=>p.kssKnee_pre!=="").map(p=>{
    const pCtrls = allC.filter(x=>Number(x.pacienteId)===Number(p.id)&&x.kss_knee!=="")
      .sort((a,b)=>{ const ord=PERIODOS.map(x=>x.id); return ord.indexOf(a.periodo)-ord.indexOf(b.periodo); });
    const lastCtrl = pCtrls[pCtrls.length-1];
    return lastCtrl ? {pre:Number(p.kssKnee_pre),post:Number(lastCtrl.kss_knee),n:p.nombre||"?"} : null;
  }).filter(Boolean);
    if(!pairs.length) return "";
    const improved=pairs.filter(p=>p.post>p.pre).length;
    const avgDiff=(pairs.reduce((s,p)=>s+(p.post-p.pre),0)/pairs.length).toFixed(1);
    const diff=Number(avgDiff);
    return `<div class="chart-wrap">
      <div class="chart-title">&#128200; Mejora KSS Knee</div>
      <div class="chart-sub">${pairs.length} pacientes con seguimiento</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
        <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:8px">
          <div style="font-size:22px;font-weight:800;color:#64748b">${avg(pairs.map(p=>p.pre))}</div>
          <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em">Pre-op</div>
        </div>
        <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:8px">
          <div style="font-size:22px;font-weight:800;color:#15803d">${avg(pairs.map(p=>p.post))}</div>
          <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em">Post-op</div>
        </div>
        <div style="text-align:center;padding:12px;background:${diff>=0?"#f0fdf4":"#fef2f2"};border-radius:8px">
          <div style="font-size:22px;font-weight:800;color:${diff>=0?"#15803d":"#dc2626"}">${diff>=0?"+":""}${avgDiff}</div>
          <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em">Promedio \u0394</div>
        </div>
      </div>
      ${barChart("","",
        [{l:"Mejorados",v:improved},{l:"Sin mejora",v:pairs.length-improved}],
        "#0f4c81"
      ).replace('<div class="chart-wrap">','<div>').replace('</div>','').split('</div>').slice(1).join('</div>')}
    </div>`;
  }

  // ── Fixed charts ──
  const implantesChart = barChart("&#128295; Implantes utilizados","Distribuci\u00f3n por sistema",countBy("implante"),"#0f4c81");
  const cirujanoChart  = barChart("&#129332; Casos por cirujano","Total de ciruj\u00edas registradas",countBy("cirujano"),"#1e6fb5");
  const tecnicaChart   = barChart("&#128295; T\u00e9cnica quir\u00fargica","\u00bfConvencional, navegaci\u00f3n, rob\u00f3tica?",countBy("tecnica"),"#0369a1");
  const ladoChart      = barChart("&#129460; Lado operado","Derecho vs Izquierdo",countBy("lado"),"#7c3aed");
  const klChart        = barChart("&#129462; Kellgren-Lawrence pre-op","Grado de artrosis",countBy("kellgren"),"#b45309");
  const resurfChart    = barChart("&#128203; Resurfacing rotuliano","",countBy("patella_resurfacing"),"#0891b2");

  // ── Custom chart ──
  const CHART_FIELDS = [
    {key:"ejeMecanico",      label:"HKA Pre (°)"},
    {key:"ejeMecanico_post", label:"HKA Post (°)"},
    {key:"mad",              label:"MAD Pre (mm)"},
    {key:"mad_post",         label:"MAD Post (mm)"},
    {key:"kssKnee_pre",      label:"KSS Pre"},
    {key:"kssFuncion_pre",   label:"KSS Func Pre"},
    {key:"oxford_pre",       label:"Oxford Pre"},
    {key:"womac_pre",        label:"WOMAC Pre"},
    {key:"vas_pre",          label:"VAS Pre"},
    {key:"tug_pre",          label:"TUG Pre (seg)"},
    {key:"tibialSlope",      label:"Tibial Slope Pre"},
    {key:"tibialSlope_post", label:"Tibial Slope Post"},
    {key:"mpta",             label:"MPTA"},
    {key:"edad",             label:"Edad"},
    {key:"imc",              label:"IMC"},
    {key:"tiempoCirugia",    label:"Tiempo Cx (min)"},
    {key:"sangrado",         label:"Sangrado (ml)"},
    {key:"extension_pre",    label:"Extensión pre (°)"},
    {key:"flexion_pre",      label:"Flexión pre (°)"},
  ];
  const GROUP_FIELDS = [
    {key:"",        label:"Sin agrupar"},
    {key:"cirujano",label:"Cirujano"},
    {key:"lado",    label:"Lado"},
    {key:"sexo",    label:"Sexo"},
    {key:"implante",label:"Implante"},
    {key:"tecnica", label:"T\u00e9cnica"},
    {key:"kellgren",label:"Kellgren-Lawrence"},
  ];

  function customChartHTML(){
    const {xKey,yKey,groupKey} = STATE.customChart;
    const xLabel = CHART_FIELDS.find(f=>f.key===xKey)?.label||xKey;
    const yLabel = CHART_FIELDS.find(f=>f.key===yKey)?.label||yKey;
    const fieldOpts = k => CHART_FIELDS.map(f=>`<option value="${f.key}"${k===f.key?" selected":""}>${f.label}</option>`).join("");
    const groupOpts = GROUP_FIELDS.map(f=>`<option value="${f.key}"${groupKey===f.key?" selected":""}>${f.label}</option>`).join("");

    // Build scatter
    const validPts = pts.filter(p=>p[xKey]!==""&&!isNaN(Number(p[xKey]))&&p[yKey]!==""&&!isNaN(Number(p[yKey])));
    let scatterSVG = `<div style="color:#94a3b8;font-size:13px;padding:20px;text-align:center">Sin datos suficientes para graficar</div>`;
    if(validPts.length>=2){
      const xs=validPts.map(p=>Number(p[xKey])), ys=validPts.map(p=>Number(p[yKey]));
      const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
      const rx=maxX-minX||1, ry=maxY-minY||1;
      const W=340,H=240,PAD=44;
      const sx=v=>PAD+(v-minX)/rx*(W-PAD*2);
      const sy=v=>H-PAD-(v-minY)/ry*(H-PAD*2);
      const COLORS=["#0f4c81","#dc2626","#15803d","#7c3aed","#b45309","#0891b2","#be185d"];
      const groups = groupKey ? [...new Set(validPts.map(p=>p[groupKey]||"?"))] : [""];
      const legend = groupKey ? groups.map((g,i)=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b;margin-right:10px"><svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="${COLORS[i%COLORS.length]}"/></svg>${g}</span>`).join("") : "";
      const dots2 = validPts.map(p=>{
        const gi = groupKey ? groups.indexOf(p[groupKey]||"?") : 0;
        const col = COLORS[gi%COLORS.length];
        return `<circle cx="${sx(Number(p[xKey]))}" cy="${sy(Number(p[yKey]))}" r="5" fill="${col}" stroke="#fff" stroke-width="1.5" opacity=".85"><title>${p.nombre||"?"}: ${xLabel}=${p[xKey]}, ${yLabel}=${p[yKey]}</title></circle>`;
      }).join("");
      // Trendline
      const n=xs.length, sx2=xs.reduce((a,b)=>a+b,0), sy2=ys.reduce((a,b)=>a+b,0);
      const sxy=validPts.reduce((a,p)=>a+Number(p[xKey])*Number(p[yKey]),0);
      const sxx=xs.reduce((a,b)=>a+b*b,0);
      const slope=(n*sxy-sx2*sy2)/(n*sxx-sx2*sx2)||0;
      const intercept=(sy2-slope*sx2)/n;
      const tx1=minX, ty1=slope*tx1+intercept, tx2=maxX, ty2=slope*tx2+intercept;
      const ticks=[];
      const xStep=Math.ceil(rx/5)||1, yStep=Math.ceil(ry/5)||1;
      for(let v=Math.ceil(minX/xStep)*xStep;v<=maxX;v+=xStep) ticks.push(`<text x="${sx(v)}" y="${H-PAD+13}" text-anchor="middle" font-size="9" fill="#94a3b8">${v}</text><line x1="${sx(v)}" y1="${H-PAD}" x2="${sx(v)}" y2="${H-PAD+4}" stroke="#e2e8f0"/>`);
      for(let v=Math.ceil(minY/yStep)*yStep;v<=maxY;v+=yStep) ticks.push(`<text x="${PAD-6}" y="${sy(v)+3}" text-anchor="end" font-size="9" fill="#94a3b8">${v}</text><line x1="${PAD-4}" y1="${sy(v)}" x2="${PAD}" y2="${sy(v)}" stroke="#e2e8f0"/>`);
      scatterSVG = `<div style="overflow-x:auto">
        <svg width="${W}" height="${H}" style="display:block;margin:0 auto">
          <rect width="${W}" height="${H}" fill="#f8fafc" rx="6"/>
          ${ticks.join("")}
          <line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          <line x1="${sx(tx1)}" y1="${sy(ty1)}" x2="${sx(tx2)}" y2="${sy(ty2)}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
          ${dots2}
          <text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="10" fill="#64748b">${xLabel}</text>
        </svg>
        ${legend?`<div style="margin-top:8px;text-align:center">${legend}</div>`:""}
      </div>`;
    }

    return `<div class="chart-wrap">
      <div class="chart-title">&#127919; Gr\u00e1fico personalizado</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div class="field"><label>Eje X</label><select onchange="setCustomChart('xKey',this.value)" style="width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;cursor:pointer">${fieldOpts(xKey)}</select></div>
        <div class="field"><label>Eje Y</label><select onchange="setCustomChart('yKey',this.value)" style="width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;cursor:pointer">${fieldOpts(yKey)}</select></div>
        <div class="field"><label>Color por</label><select onchange="setCustomChart('groupKey',this.value)" style="width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;cursor:pointer">${groupOpts}</select></div>
      </div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:12px">${validPts.length} pacientes con datos para ambos ejes &nbsp;·&nbsp; L\u00ednea gris = tendencia</div>
      ${scatterSVG}
    </div>`;
  }

  return `
    <div style="margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div style="font-weight:800;font-size:16px;color:#1e293b">&#128202; Dashboard</div><div style="font-size:12px;color:#94a3b8">${pts.length} pacientes &middot; \u00daltima actualizaci\u00f3n hoy</div></div>
    </div>
    ${kpiGrid}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:0">
      <div>${scatterHKA()}</div>
      <div>${kssImprovement()}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:0">
      <div>${implantesChart}</div>
      <div>${cirujanoChart}</div>
      <div>${tecnicaChart}</div>
      <div>${klChart}</div>
      <div>${ladoChart}</div>
      <div>${resurfChart}</div>
    </div>
    ${customChartHTML()}
  `;
}

function setCustomChart(k,v){ STATE.customChart[k]=v; render(); }

function renderLogin(){
  return `<div id="login-screen">
    <div class="login-box">
      <div class="logo">
        <div class="emoji">🦴</div>
        <h1>Protocolo PTR</h1>
        <p>Prótesis Total de Rodilla</p>
      </div>
      <div class="field">

        <input type="text" id="login-u" placeholder="Ej: fernandez" autocomplete="username"
          style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;outline:none"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-p" placeholder="••••••••" autocomplete="current-password"

function render(){
  const app = document.getElementById("app");
  if(!STATE.user){ app.innerHTML=renderLogin(); return; }

  const demo  = STATE.user.role==="demo";
  const admin = STATE.user.role==="admin";
  const v     = STATE.view;

  const header = `<div class="header">
    <div class="header-inner">
      <div class="header-logo">
        <span style="font-size:22px">🦴</span>
        <div><h1>Protocolo PTR</h1><p>Prótesis Total de Rodilla · v3.1</p></div>
      </div>
      <div class="header-nav">
        ${demo?`<span class="demo-badge">DEMO — Solo lectura</span>`:""}
        <button class="nav-btn${v==="list"||v==="form"?" active":""}" onclick="goList()">📋 Pacientes</button>
        <button class="nav-btn${v==="dashboard"?" active":""}" onclick="goDashboard()">📊 Dashboard</button>
        ${admin?`<button class="nav-btn${v==="config"?" active":""}" onclick="goConfig()">⚙️ Configuración</button>`:""}
        <div class="nav-sep"></div>
        <span class="nav-user">👤 ${STATE.user.name}</span>
        <button class="nav-exit" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </div>`;

  let pageContent = "";
  if(v==="list")      pageContent = renderList();
  if(v==="form")      pageContent = renderForm();
  if(v==="config")    pageContent = renderConfig();
  if(v==="dashboard") pageContent = renderDashboard();

  app.innerHTML = header + `<div class="page">${pageContent}</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doLogin(){
  const u = document.getElementById("login-u")?.value.trim()||"";
  const p = document.getElementById("login-p")?.value||"";
  const found = STATE.users.find(x=>x.username===u&&x.password===p&&x.active);
  if(found){ STATE.user=found; render(); }
  else { document.getElementById("login-err").style.display="block"; }
}
function doLogout(){ STATE.user=null; STATE.view="list"; render(); }

function setFormField(key,val){
  STATE.form[key]=val;
}

function switchTab(id){ autoSave(); STATE.tab=id; render(); }
function goList(){ STATE.view="list"; STATE.editId=null; STATE.form=emptyForm(); render(); }
function goDashboard(){ STATE.view="dashboard"; render(); }
function goConfig(){ STATE.view="config"; render(); }
function newPatient(){ STATE.form=emptyForm(); STATE.editId=null; STATE.currentControles=[]; STATE.tab="demografico"; STATE.view="form"; render(); }

function editPatient(id){
  const nid = Number(id);
  const p = STATE.patients.find(x=>Number(x.id)===nid);
  if(!p) return;
  STATE.form = {...emptyForm(),...p}; if(p.fechaNac) calcEdad(p.fechaNac);
  STATE.currentControles = getControlesPaciente(Number(nid));
  STATE.editId = nid;
  STATE.tab = "demografico";
  STATE.view = "form";
  render();
}

function delPatient(id){
  if(!confirm("¿Eliminar este registro y todos sus controles?")) return;
  STATE.patients = STATE.patients.filter(p=>p.id!==id);
  lsSet(KEYS.patients, STATE.patients);
  fsDeletePatient(id);
  const toDelete = getControles().filter(c=>c.pacienteId===id);
  toDelete.forEach(ctrl=>fsDeleteControl(ctrl.id));
  saveControles(getControles().filter(c=>c.pacienteId!==id));
  render();
}

function collectFormFromDOM(){
  // STATE.form is always up-to-date via setFormField() called on every input.
  // We only need to scrape custom fields which are dynamically keyed.
  STATE.customFields.forEach(cf=>{
    const el=document.querySelector(`[oninput*="${cf.key}"], [onchange*="${cf.key}"]`);
    if(el) STATE.form[cf.key]=el.value;
  });
}
function persistForm(){
  const f = STATE.form;
  const eid = STATE.editId ? Number(STATE.editId) : null;
  
  if(eid){
    const found = STATE.patients.some(p=>Number(p.id)===eid);
    if(found){
      STATE.patients = STATE.patients.map(p=>Number(p.id)===eid ? {...f, id:eid} : p);
    } else {
      STATE.patients = [...STATE.patients, {...f, id:eid}];
    }
  } else {
    const newId = Date.now();
    STATE.form.id = newId;
    STATE.editId = newId;
    STATE.patients = [...STATE.patients, {...STATE.form}];
  }
  lsSet(KEYS.patients, STATE.patients);
  // Sync to Firestore
  const savedPt = STATE.patients.find(p=>Number(p.id)===Number(STATE.editId||STATE.form.id));
  if(savedPt){ setSyncStatus("syncing"); fsSetPatient(savedPt).then(()=>setSyncStatus("synced")); }
}
function autoSave(){
  if(STATE.user.role==="demo") return;
  collectFormFromDOM();
  persistForm();
}
function savePatient(){
  if(STATE.user.role==="demo"){ alert("Modo demo: sin permisos de guardado."); return; }
  collectFormFromDOM();
  persistForm();
  STATE.savedFlash=true;
  setTimeout(()=>{ STATE.savedFlash=false; },2500);
  goList();
}
function nextTab(){
  autoSave();
  const ids = TABS.map(t=>t.id);
  const idx = ids.indexOf(STATE.tab);
  if(idx < ids.length-1){ STATE.tab=ids[idx+1]; render(); }
}
function prevTab(){
  autoSave();
  const ids = TABS.map(t=>t.id);
  const idx = ids.indexOf(STATE.tab);
  if(idx > 0){ STATE.tab=ids[idx-1]; render(); }
}

// Config actions

function setCfNew(k,v){ STATE.cfNew[k]=v; render(); }
function addCustomField(){
  const label=document.getElementById("cf-label")?.value.trim()||"";
  const sec=document.getElementById("cf-sec")?.value||"";
  const type=document.getElementById("cf-type")?.value||"text";
  if(!label||!sec){ alert("Complete nombre y sección."); return; }
  const key="custom_"+Date.now();
  const f={key,label,type,section:sec};
  if(type==="select"){
    const raw=document.getElementById("cf-opts")?.value||"";
    f.opts=raw.split(",").map(s=>s.trim()).filter(Boolean);
    if(!f.opts.length){ alert("Agrega al menos una opción."); return; }
  }
  STATE.customFields=[...STATE.customFields,f];
  lsSet("ptr_customFields_v1",STATE.customFields);
  STATE.cfNew={label:"",type:"text",section:"demografico"};
  STATE.configFlash="Campo agregado ✓";
  setTimeout(()=>{ STATE.configFlash=""; render(); },2000);
  render();
}
function delCustomField(i){
  if(!confirm("\u00bfEliminar este campo?")) return;
  STATE.customFields=STATE.customFields.filter((_,j)=>j!==i);
  lsSet("ptr_customFields_v1",STATE.customFields);
  render();
}

function setCfgSec(sec){ STATE.configSec=sec; STATE.editListKey=null; STATE.pwdTarget=null; STATE.configFlash=""; render(); }
function startEditList(key){ STATE.editListKey=key; STATE.editListDraft=[...STATE.config[key]]; render(); }
function cancelEditList(){ STATE.editListKey=null; render(); }
function removeListItem(i){ STATE.editListDraft.splice(i,1); render(); }
function moveListItem(i,d){
  const a=STATE.editListDraft, j=i+d;
  if(j<0||j>=a.length) return;
  [a[i],a[j]]=[a[j],a[i]];
  render();
}
function addListItem(){
  const el=document.getElementById("new-list-item");
  if(!el||!el.value.trim()) return;
  STATE.editListDraft.push(el.value.trim());
  render();
}
function saveList(){
  STATE.config[STATE.editListKey]=[...STATE.editListDraft];
  lsSet(KEYS.config, STATE.config);
  fsSaveConfig(STATE.config);
  STATE.editListKey=null;
  STATE.configFlash="Lista guardada ✓";
  setTimeout(()=>{ STATE.configFlash=""; render(); },2500);
  render();
}

function togglePwdVisible(uid, pwd){
  const el = document.getElementById("pwd-display-"+uid);
  if(!el) return;
  el.textContent = el.textContent.includes("•") ? pwd : "••••••••";
}
function startPwd(id){ STATE.pwdTarget=id; render(); }
function cancelPwd(){ STATE.pwdTarget=null; render(); }
function savePwd(){
  const p=document.getElementById("new-pwd")?.value||"";
  if(p.length<4){ alert("Mínimo 4 caracteres."); return; }
  STATE.users=STATE.users.map(u=>u.id===STATE.pwdTarget?{...u,password:p}:u);
  lsSet(KEYS.users,STATE.users);
  STATE.pwdTarget=null;
  STATE.configFlash="Contraseña actualizada ✓";
  setTimeout(()=>{ STATE.configFlash=""; render(); },2500);
  render();
}
function toggleUser(id){
  if(id===STATE.user.id){ alert("No puede desactivar tu propio usuario."); return; }
  STATE.users=STATE.users.map(u=>u.id===id?{...u,active:!u.active}:u);
  lsSet(KEYS.users,STATE.users);
  render();
}
function deleteUser(id){
  if(id===STATE.user.id){ alert("No puede eliminar tu propio usuario."); return; }
  if(!confirm("¿Eliminar usuario?")) return;
  STATE.users=STATE.users.filter(u=>u.id!==id);
  lsSet(KEYS.users,STATE.users);
  render();
}
function addUser(){
  const name=document.getElementById("nu-name")?.value.trim()||"";
  const user=document.getElementById("nu-user")?.value.trim().toLowerCase()||"";
  const pass=document.getElementById("nu-pass")?.value.trim()||"";
  const role=document.getElementById("nu-role")?.value||"user";
  if(!name||!user||!pass){ alert("Complete todos los campos."); return; }
  if(STATE.users.find(u=>u.username===user)){ alert("Nombre de usuario ya existe."); return; }
  STATE.users=[...STATE.users,{id:Date.now(),name,username:user,password:pass,role,active:true}];
  lsSet(KEYS.users,STATE.users);
  STATE.configFlash="Usuario creado ✓";
  setTimeout(()=>{ STATE.configFlash=""; render(); },2500);
  render();
}

function doExport(){
  const pts = STATE.patients;
  if(!pts.length){ alert("No hay pacientes."); return; }
  const allControles = getControles();

  // ── Column groups definition ───────────────────────────────────────────────

  const PERIODOS_EXPORT = ["preop","6m","12m","24m","3-5a","5-9a","10a+"];

  // Fields to skip from the patient base object
  const skipFields = new Set([
    // Internal/technical
    "id","fechaCx","_oxford_pre_vals","_womac_pre_vals",
    // Legacy/renamed fields that may exist in old patient records
    "hc","seguimiento_meses",
    "kssKnee_post","kssFuncion_post","womac_post","oxford_post",
    "vas_post","tug_post","extension_post","flexion_post",
    // Pre-op scores (exported via controls Pre-operatorio columns)
    "kssKnee_pre","kssFuncion_pre","womac_pre","oxford_pre","vas_pre","tug_pre",
    "extension_pre","flexion_pre",
    // Internal sub-scores
    "womac_dolor_pre","womac_rigidez_pre","womac_func_pre",
    // Obsolete legacy fields
    "ldfa","flexum","rangoFlex","corte_femoral_frontal","corte_femoral_sagital",

  const baseKeys = Object.keys(pts[0]||{}).filter(k=>!skipFields.has(k)&&!k.startsWith("_"));

  // ── Group definitions for header row 1 ────────────────────────────────────
  // Each group: { label, count }  — drives merges in row 1
  const BASE_GROUPS = [
    { label:"Identificación",   keys:["fechaRegistro","nombre","rut","fechaNac","edad","correo"] },
    { label:"Datos paciente",   keys:["sexo","lado","imc","asa","dm","hta","tabaco","anticoagulacion","indicacion","tiempoEvolucion","cirugiaPrevia"] },

  const row1styled = colList.map((_,ci)=>{

  // ── Rebuild row 2 with styles ──────────────────────────────────────────────
  const row2styled = colList.map((col_def,ci)=>{
    const grp = groups.find(g=>ci>=g.start&&ci<=g.end);

    return makeCellS(col_def.h2, 1, ci, isFirst ? STYLE_R2_FIRST : STYLE_R2_NORMAL);
  }).join("");

  // ── Rebuild data rows with styles ─────────────────────────────────────────
  const dataXmlStyled = dataRows.map((row,ri)=>`<row r="${ri+3}">${
    row.map((val,ci)=>{
      const grp=groups.find(g=>ci>=g.start&&ci<=g.end);
      const isFirst=ci===grp.start;
      return makeCellS(val, ri+2, ci, isFirst ? STYLE_DATA_FIRST : STYLE_DATA_NORMAL);
    }).join("")
  }</row>`).join("");

  const shXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <sheetViews><sheetView workbookViewId="0"><pane ySplit="2" topLeftCell="A3" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>
  <sheetData>
    <row r="1" ht="24" customHeight="1">${row1styled}</row>
    <row r="2" ht="40" customHeight="1">${row2styled}</row>
    ${dataXmlStyled}
  </sheetData>
  ${mergeXml?`<mergeCells count="${groups.filter(g=>g.end>g.start).length}">${mergeXml}</mergeCells>`:""}
</worksheet>`;

  const wbXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="PTR" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const wbR=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`;

// ── RUT formatter ─────────────────────────────────────────────────────────────
function formatRut(val){
  // Strip everything except digits and k/K
  let v = val.replace(/[^0-9kK]/g,"").toUpperCase();
  if(!v) return "";
  // Separate verifier digit
  const dv = v.slice(-1);
  let body = v.slice(0,-1).replace(/^0+/,""); // remove leading zeros
  if(!body) return dv; // only verifier typed
  // Add dots every 3 digits from right
  let formatted = "";
  let i = body.length;
  while(i > 0){
    formatted = body.slice(Math.max(0,i-3), i) + (formatted ? "." + formatted : "");
    i -= 3;
  }
  return formatted + "-" + dv;
}

function formatRutInput(input){
  const raw = input.value;
  const formatted = formatRut(raw);
  input.value = formatted;
  setFormField("rut", formatted);
}
